name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS DMG
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install flask pyinstaller pillow pyobjc-framework-Cocoa certifi

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Update version in app.py
        run: |
          sed -i '' "s/APP_VERSION = \".*\"/APP_VERSION = \"${{ steps.version.outputs.VERSION }}\"/" app.py

      - name: Generate app icon
        run: python3 make_icon.py

      - name: Build with PyInstaller
        run: pyinstaller rclone-gui.spec --noconfirm

      - name: Update version in built Info.plist
        run: |
          VER="${{ steps.version.outputs.VERSION }}"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $VER" "dist/rclone GUI.app/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $VER" "dist/rclone GUI.app/Contents/Info.plist"

      - name: Remove macOS quarantine from built app
        run: xattr -cr "dist/rclone GUI.app"

      - name: Create DMG
        run: |
          VER="${{ steps.version.outputs.VERSION }}"
          mkdir -p dist/dmg_staging
          cp -R "dist/rclone GUI.app" dist/dmg_staging/
          cp "Install rclone GUI.command" dist/dmg_staging/

          create-dmg \
            --volname "rclone GUI" \
            --window-pos 200 120 \
            --window-size 660 420 \
            --icon-size 100 \
            --icon "rclone GUI.app" 180 200 \
            --icon "Install rclone GUI.command" 460 200 \
            --hide-extension "rclone GUI.app" \
            --no-internet-enable \
            "dist/rclone-GUI-v${VER}.dmg" \
            "dist/dmg_staging/" || \
          hdiutil create \
            -volname "rclone GUI" \
            -srcfolder "dist/dmg_staging" \
            -ov -format UDZO \
            "dist/rclone-GUI-v${VER}.dmg"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "rclone GUI v${{ steps.version.outputs.VERSION }}"
          body_path: CHANGELOG.md
          files: "dist/rclone-GUI-v${{ steps.version.outputs.VERSION }}.dmg"
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
